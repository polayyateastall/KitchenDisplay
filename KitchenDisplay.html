<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Polayya Kitchen Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#111;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:#1f1f1f;
    border:1px solid #333;
    border-radius:14px;
    overflow:hidden;
    margin-bottom:12px;
}

.header{
    background:#2b2b2b;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    font-weight:bold;
}

.details{
    display:none;
    padding:15px;
}

.item{
    margin:8px 0;
}

.status{
    color:#aaa;
    margin-bottom:12px;
}

.buttons{
    margin-top:15px;
}

button{
    border:none;
    border-radius:8px;
    padding:10px 14px;
    cursor:pointer;
    font-weight:600;
    margin-right:8px;
}

.preparing{
    background:#f59f00;
    color:white;
}

.ready{
    background:#1971c2;
    color:white;
}

.served{
    background:#2f9e44;
    color:white;
}

/* Modal */

#confirmModal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-box{
    background:#222;
    padding:25px;
    border-radius:12px;
    width:90%;
    max-width:360px;
    text-align:center;
    border:1px solid #444;
}

.modal-box h3{
    margin-bottom:12px;
}

.modal-box p{
    margin-bottom:20px;
    color:#ccc;
}

.confirm-btn{
    background:#2f9e44;
    color:white;
}

.cancel-btn{
    background:#666;
    color:white;
}

</style>

</head>

<body>

<h1>☕ Pending Orders</h1>

<div id="orders"></div>

<!-- Confirmation Modal -->

<div id="confirmModal">

```
<div class="modal-box">

    <h3>Confirm Order Served</h3>

    <p>
        This order will be removed from the pending orders list.
    </p>

    <button
        id="confirmYes"
        class="confirm-btn">
        Yes, Mark Served
    </button>

    <button
        class="cancel-btn"
        onclick="closeModal()">
        Cancel
    </button>

</div>
```

</div>

<script>

/* REPLACE WITH YOUR APPS SCRIPT WEB APP URL */

const api =
"https://script.google.com/macros/s/AKfycbxV_4fW6Af9jdwBe_zX_2pdUAGsSdVzD2yyU1TIUCs39nRzDGdN8kVWvlGM9-PsbZVB/exec";

let selectedOrderId = "";

function toggle(el){

    const details =
        el.nextElementSibling;

    details.style.display =
        details.style.display === "block"
        ? "none"
        : "block";
}

async function loadOrders(){

    try{

        const response =
            await fetch(
                api + "?action=orders"
            );

        const orders =
            await response.json();

        const container =
            document.getElementById("orders");

        container.innerHTML = "";

        orders.forEach(order => {

            const card =
                document.createElement("div");

            card.className = "card";

            card.innerHTML = `

            <div class="header"
                 onclick="toggle(this)">

                <span>${order.orderId}</span>

                <span>Table ${order.table}</span>

            </div>

            <div class="details">

                <div class="status">
                    Status: ${order.status}
                </div>

                ${order.tea ? `<div class="item">Tea × ${order.tea}</div>` : ""}
                ${order.coffee ? `<div class="item">Coffee × ${order.coffee}</div>` : ""}
                ${order.lemonTea ? `<div class="item">Lemon Tea × ${order.lemonTea}</div>` : ""}
                ${order.greenTea ? `<div class="item">Green Tea × ${order.greenTea}</div>` : ""}
                ${order.horlicks ? `<div class="item">Horlicks × ${order.horlicks}</div>` : ""}
                ${order.boost ? `<div class="item">Boost × ${order.boost}</div>` : ""}
                ${order.elaichiTea ? `<div class="item">Elaichi Tea × ${order.elaichiTea}</div>` : ""}
                ${order.gingerTea ? `<div class="item">Ginger Tea × ${order.gingerTea}</div>` : ""}
                ${order.sonthiCoffee ? `<div class="item">Sonthi Coffee × ${order.sonthiCoffee}</div>` : ""}

                <div class="buttons">

                    <button
                        class="preparing"
                        onclick="updateStatus('${order.orderId}','Preparing')">
                        Preparing
                    </button>

                    <button
                        class="ready"
                        onclick="updateStatus('${order.orderId}','Ready')">
                        Ready
                    </button>

                    <button
                        class="served"
                        onclick="confirmServed('${order.orderId}')">
                        Served
                    </button>

                </div>

            </div>

            `;

            container.appendChild(card);

        });

    }catch(err){

        console.error("Error loading orders:", err);
    }
}

async function updateStatus(orderId,status){

    try{

        await fetch(api,{

            method:"POST",

            mode:"no-cors",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                action:"updateStatus",
                orderId:orderId,
                status:status

            })

        });

        setTimeout(loadOrders,1000);

    }catch(err){

        console.error("Status update failed:", err);
    }
}

function confirmServed(orderId){

    selectedOrderId = orderId;

    document.getElementById("confirmModal")
        .style.display = "flex";
}

function closeModal(){

    document.getElementById("confirmModal")
        .style.display = "none";
}

document.addEventListener("DOMContentLoaded", () => {

    document.getElementById("confirmYes")
        .addEventListener("click", async () => {

            await updateStatus(
                selectedOrderId,
                "Served"
            );

            closeModal();

        });

});

loadOrders();

/* Auto refresh every 3 seconds */

setInterval(loadOrders,3000);

</script>

</body>
</html>
